<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRJ Wear</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:black;color:white;padding:15px;text-align:center;font-size:24px}
nav{display:flex;justify-content:center;background:#333}
nav a{color:white;padding:14px 20px;text-decoration:none}
nav a:hover{background:#555}
.container{padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:white;padding:10px;border-radius:10px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.2)}
.card img{width:100%;border-radius:10px}
button{background:black;color:white;border:none;padding:10px;margin-top:10px;cursor:pointer;border-radius:5px}
footer{background:black;color:white;text-align:center;padding:10px;margin-top:20px}
</style>
</head>
<body>

<header>NRJ WEAR</header>

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
</nav>

<div class="container">
<h2 style="text-align:center">Trending Collection</h2>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200" alt="">
<h3>Baggy Jeans</h3>
<p>₹999</p>
<button onclick="order('Baggy Jeans')">Order Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200" alt="">
<h3>Oversized T-Shirt</h3>
<p>₹499</p>
<button onclick="order('Oversized T-Shirt')">Order Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200" alt="">
<h3>Hoodie</h3>
<p>₹1199</p>
<button onclick="order('Hoodie')">Order Now</button>
</div>

</div>
</div>

<footer id="contact">
<p>Contact on WhatsApp: 9876543210</p>
</footer>

<script>
function order(product){
let number = "919876543210";
let msg = `I want to order ${product}`;
window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
